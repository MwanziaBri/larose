    <!-- Better CSS to prevent zoom but allow scrolling -->
    <style>
      html {
        -webkit-text-size-adjust: 100%;
        -ms-text-size-adjust: 100%;
      }
      body {
        overflow-y: auto !important;
        -webkit-overflow-scrolling: touch !important;
      }
      /* Allow pinch zoom but with limits */
      @media screen and (max-width: 768px) {
        body {
          touch-action: pan-y pinch-zoom;
        }
      }
    </style>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- FIXED: Better script to prevent excessive zoom but allow scrolling -->
    <script>
      // Only prevent zoom when multiple fingers are detected
      let lastTouchEnd = 0;
      let scale = 1;
      
      document.addEventListener('touchstart', function(event) {
        if (event.touches.length > 1) {
          event.preventDefault();
        }
      }, { passive: false });
      
      document.addEventListener('touchend', function(event) {
        const now = (new Date()).getTime();
        if (now - lastTouchEnd <= 300) {
          event.preventDefault();
        }
        lastTouchEnd = now;
      }, false);
      
      // Prevent double-tap zoom
      document.addEventListener('dblclick', function(event) {
        event.preventDefault();
      }, { passive: false });
      
      // Allow normal scrolling - REMOVE the problematic touchmove listener
      // document.addEventListener('touchmove', function (event) {
      //   if (event.scale !== 1) { event.preventDefault(); }
      // }, { passive: false });
      
      document.addEventListener('gesturestart', function(e) {
        e.preventDefault();
        // Optionally limit maximum scale
        if (scale > 2) {
          e.preventDefault();
        }
      });
      
      // Ensure body is scrollable
      document.body.style.overflowY = 'auto';
      document.body.style.webkitOverflowScrolling = 'touch';
    </script>
  </body>
